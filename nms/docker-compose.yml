services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: nms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nms}
      POSTGRES_USER: ${POSTGRES_USER:-nms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nmspass}
    volumes:
      - nms-dbdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nms} -d ${POSTGRES_DB:-nms}"]
      interval: 5s
      timeout: 3s
      retries: 20

  collector:
    build: ./app
    container_name: nms-collector
    restart: unless-stopped
    command: python -m nms.collector
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  alerter:
    build: ./app
    container_name: nms-alerter
    restart: unless-stopped
    command: python -m nms.alerter
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    container_name: nms-web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn nmsweb.wsgi:application -b 0.0.0.0:8000 -w 3 --timeout 60"
    env_file: .env
    ports:
      - "${WEB_BIND:-0.0.0.0}:8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # HTTPS opsional. Aktifkan dengan:  docker compose --profile https up -d
  # Lalu di .env: HTTPS_ENABLED=1 dan WEB_BIND=127.0.0.1 supaya port 8000
  # tidak lagi bisa diakses langsung tanpa TLS.
  caddy:
    image: caddy:2-alpine
    container_name: nms-caddy
    restart: unless-stopped
    profiles: ["https"]
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  nms-dbdata:
  caddy_data:
  caddy_config:

